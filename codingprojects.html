<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: url('bg.jpg') no-repeat center/cover;
  color: #333;
}

header {
  background: linear-gradient(135deg, #6EC6FF, #3A7BD5);
  padding: 30px 20px;
  text-align: center;
  color: white;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  padding: 8px 18px;
  border-radius: 20px;
}

nav a:hover {
  background: rgba(255,255,255,0.2);
}

section {
  max-width: 1000px;
  margin: 40px auto;
  padding: 30px;
  background: rgba(255,255,255,0.95);
  border-radius: 15px;
}

.project {
  text-align: center;
  margin-bottom: 35px;
}

.project img {
  width: 90%;
  max-width: 750px;
  border-radius: 15px;
  transition: 0.3s;
}

.project img:hover {
  transform: scale(1.05);
}

.project a {
  display: inline-block;
  margin-top: 10px;
  text-decoration: none;
  background: #3A7BD5;
  color: white;
  padding: 8px 16px;
  border-radius: 15px;
}

.project a:hover {
  background: #2a5da8;
}

footer {
  background: linear-gradient(135deg, #6EC6FF, #3A7BD5);
  color: white;
  text-align: center;
  padding: 25px;
  margin-top: 40px;
}

footer a {
  color: white;
}

/* Responsive */
@media (max-width: 600px) {
  nav a {
    display: block;
    margin: 8px 0;
  }

  section {
    margin: 20px;
    padding: 15px;
  }

  .project img {
    width: 100%;
  }
}
</style>
