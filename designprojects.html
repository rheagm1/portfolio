<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Projects</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: url('bg.jpg') no-repeat center/cover;
  color: #333;
}

header {
  background: linear-gradient(135deg, #6EC6FF, #3A7BD5);
  padding: 30px 20px;
  text-align: center;
  color: white;
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
  color: white;
  padding: 8px 18px;
  border-radius: 20px;
}

nav a:hover {
  background: rgba(255,255,255,0.2);
}

section {
  max-width: 1000px;
  margin: 40px auto;
  padding: 30px;
  background: rgba(255,255,255,0.95);
  border-radius: 15px;
}

.gallery {
  display: flex;
  flex-direction: column;
  gap: 25px;
  align-items: center;
}

.gallery img {
  width: 90%;
  max-width: 750px;
  border-radius: 15px;
  transition: 0.3s;
  cursor: pointer;
}

.gallery img:hover {
  transform: scale(1.05);
}

.video-section {
  text-align: center;
  margin-top: 30px;
}

video {
  width: 90%;
  max-width: 700px;
  border-radius: 15px;
  margin-top: 15px;
}

footer {
  background: linear-gradient(135deg, #6EC6FF, #3A7BD5);
  color: white;
  text-align: center;
  padding: 25px;
  margin-top: 40px;
}

footer a {
  color: white;
}

/* Responsive design */
@media (max-width: 600px) {
  nav a {
    display: block;
    margin: 8px 0;
  }

  section {
    margin: 20px;
    padding: 15px;
  }

  .gallery img {
    width: 100%;
  }

  video {
    width: 100%;
  }
}
</style>
</head>

<body>

<header>
  <h1>Design Projects</h1>
  <nav>
    <a href="myportfolio.html">Home</a>
    <a href="codingprojects.html">Coding Projects</a>
    <a href="designprojects.html">Design Projects</a>
  </nav>
</header>

<section>
  <div class="gallery">
    <img src="project1.png" alt="Project 1">
    <img src="project2.png" alt="Project 2">
    <img src="project3.png" alt="Project 3">
    <img src="project4.png" alt="Project 4">
    <img src="project5.png" alt="Project 5">
  </div>

  <div class="video-section">
    <h2>Project Video</h2>
    <video controls>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>
</section>
